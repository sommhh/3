<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番爆速検索</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}
.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
}
.lens{background:#000;}
.search{background:#4285f4;}
.option{
  text-align:left;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 型番爆速検索</h2>

<button class="btn lens" onclick="openLens()">📷 Googleレンズ</button>

<input id="modelInput" placeholder="型番を入力（長押しペーストOK）">

<div class="option">
  <label><input type="checkbox" id="manualChk"> 取扱説明書</label><br>
  <label><input type="checkbox" id="specChk" checked> 仕様書</label>
</div>

<button class="btn search" onclick="search()">🔍 検索</button>

</div>

<script>

const ua = navigator.userAgent.toLowerCase();
const isAndroid = ua.includes("android");
const isIOS = ua.includes("iphone") || ua.includes("ipad");

let lastText = "";

// ✅ Androidだけ自動監視ON
if(isAndroid){
  setInterval(async ()=>{
    try{
      if(!navigator.clipboard) return;

      const text = await navigator.clipboard.readText();

      if(!text) return;

      const clean = text.trim();

      // 同じ内容・短すぎは無視
      if(clean === lastText || clean.length < 3) return;

      lastText = clean;

      document.getElementById("modelInput").value = clean;

      // 🔥 自動検索
      autoSearch(clean);

    }catch(e){}
  }, 1500); // 負荷軽減
}


// レンズ
function openLens(){
  if(isAndroid){
    location.href = "intent://lens.google.com/#Intent;scheme=https;package=com.google.ar.lens;end";
  }else{
    location.href = "https://lens.google.com/";
  }
}


// 検索
function search(){
  const keyword = document.getElementById("modelInput").value.trim();

  if(!keyword){
    alert("型番を入力してください");
    return;
  }

  runSearch(keyword);
}


// 自動検索共通処理
function autoSearch(keyword){
  if(!keyword) return;
  runSearch(keyword);
}


// 実検索ロジック
function runSearch(keyword){

  const manual = document.getElementById("manualChk").checked;
  const spec = document.getElementById("specChk").checked;

  let option = "";

  if(manual && spec){
    option = '("仕様書" OR "取扱説明書")';
  }else if(manual){
    option = '"取扱説明書"';
  }else if(spec){
    option = '"仕様書"';
  }

  const q = encodeURIComponent(
    `${keyword} ${option} filetype:pdf -amazon -楽天`
  );

  location.href = `https://www.google.com/search?q=${q}`;
}

</script>

</body>
</html>
