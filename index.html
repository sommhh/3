<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>型番検索</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  margin:0;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  margin:30px auto;
}

.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.lens{background:#000;}
.ocr{background:#34a853;}
.search{background:#4285f4;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}

.check-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:6px 0;
}

.check-row input{
  width:18px;
  height:18px;
}

video{
  width:100%;
  border-radius:12px;
  margin-top:10px;
  display:none;
}
video.active{display:block;}

canvas{display:none;}

.status{
  font-size:14px;
  color:#666;
  margin:8px 0;
  min-height:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>型番検索</h2>

<button class="btn lens" onclick="openLens()">📷 レンズ</button>
<button class="btn ocr" id="ocrBtn" onclick="toggleOCR()">📸 OCRスキャン</button>

<div class="status" id="status"></div>

<input id="modelInput" placeholder="型番">

<div class="check-row">
  <input type="checkbox" id="manualChk">
  <label for="manualChk">取扱説明書</label>
</div>

<div class="check-row">
  <input type="checkbox" id="specChk">
  <label for="specChk">仕様書</label>
</div>

<button class="btn search" onclick="search()">検索</button>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

</div>

<script>
const ua = navigator.userAgent.toLowerCase();
const isAndroid = ua.includes("android");

let stream = null;
let running = false;
let worker = null;
let clipboardTimer = null;
let lastClipboard = "";

/* レンズ：iOS/Android両対応 */
function openLens(){
  if(isAndroid){
    location.href = "intent://lens/#Intent;scheme=googlechrome;package=com.android.chrome;S.browser_fallback_url=https://lens.google.com/;end";
    return;
  }
  
  // iOS/PCはUniversal Link。アプリあれば自動で開く
  location.href = "https://lens.google.com/";
}

/* OCRトグル */
async function toggleOCR(){
  if(running){
    stopOCR();
  } else {
    await startOCR();
  }
}

/* OCR開始 */
async function startOCR(){
  const video = document.getElementById("video");
  const btn = document.getElementById("ocrBtn");
  const status = document.getElementById("status");
  
  try{
    btn.disabled = true;
    status.textContent = "カメラ起動中...";
    
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: "environment"}
    });
    video.srcObject = stream;
    video.classList.add("active");
    
    await video.play();
    
    // Tesseract worker初期化
    status.textContent = "OCR準備中...";
    worker = await Tesseract.createWorker("eng");
    
    running = true;
    btn.textContent = "⏹️ スキャン停止";
    btn.disabled = false;
    status.textContent = "スキャン中...";
    
    scanLoop();
  } catch(e){
    status.textContent = "カメラ起動失敗: " + e.message;
    btn.disabled = false;
    stopOCR();
  }
}

/* スキャンループ */
async function scanLoop(){
  if(!running || !worker) return;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const status = document.getElementById("status");

  // videoサイズが0の時はスキップ
  if(!video.videoWidth || !video.videoHeight){
    setTimeout(scanLoop, 500);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  try{
    const { data } = await worker.recognize(canvas);
    const model = extractModel(data.text);

    if(model){
      document.getElementById("modelInput").value = model;
      status.textContent = `検出: ${model}`;
      stopOCR();
      setTimeout(() => runSearch(model), 500);
      return;
    }
  } catch(e){
    console.error(e);
  }

  setTimeout(scanLoop, 1200);
}

/* 停止 */
function stopOCR(){
  running = false;
  
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  
  if(worker){
    worker.terminate();
    worker = null;
  }
  
  const video = document.getElementById("video");
  video.classList.remove("active");
  video.srcObject = null;
  
  const btn = document.getElementById("ocrBtn");
  btn.textContent = "📸 OCRスキャン";
  btn.disabled = false;
  
  document.getElementById("status").textContent = "";
}

  let best = ""; 
  let bestScore = 0;

      if(/-/.test(t)) score += 3;
