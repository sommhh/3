<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番検索</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}
.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
}
.lens{background:#000;}
.search{background:#4285f4;}
.option{
  text-align:left;
  margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h2>📄 型番爆速検索</h2>

<button class="btn lens" onclick="openLens()">📷 Googleレンズ</button>

<input id="modelInput" placeholder="型番入力（長押しペースト）">

<div class="option">
  <label><input type="checkbox" id="manualChk"> 取扱説明書</label><br>
  <label><input type="checkbox" id="specChk"> 仕様書</label>
</div>

<button class="btn search" onclick="search()">🔍 検索</button>

</div>

<script>

const ua = navigator.userAgent.toLowerCase();
const isAndroid = ua.includes("android");
const isIOS = ua.includes("iphone") || ua.includes("ipad");

let lastText = "";

// ✅ Android 自動化（安定版）
if(isAndroid){
  setInterval(async ()=>{
    try{
      if(!navigator.clipboard) return;

      const text = await navigator.clipboard.readText();
      if(!text) return;

      const clean = text.trim();

      if(clean.length < 3) return;
      if(clean === lastText) return;

      lastText = clean;

      document.getElementById("modelInput").value = clean;

      runSearch(clean);

    }catch(e){}
  },1500);
}


// 🔥レンズ起動（最終安定版）
function openLens(){

  if(isAndroid){
    location.href = "intent://lens.google.com/#Intent;scheme=https;package=com.google.ar.lens;end";
    return;
  }

  if(isIOS){

    // iframe方式（成功率高）
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = "googleapp://lens?entrypoint=camera";
    document.body.appendChild(iframe);

    // アプリ無い場合だけフォールバック
    const t = setTimeout(()=>{
      document.body.removeChild(iframe);
      location.replace("https://lens.google.com/");
    },1200);

    // 戻ってきた時に履歴汚さない
    window.addEventListener("pagehide", ()=>{
      clearTimeout(t);
    });

    return;
  }

  location.replace("https://lens.google.com/");
}


// 🔍検索
function search(){
  const input = document.getElementById("modelInput");
  const keyword = input.value.trim();

  if(!keyword){
    alert("型番を入力してください");
    input.focus();
    return;
  }

  runSearch(keyword);
}


// 🔍検索処理（完全版）
function runSearch(keyword){

  const manual = document.getElementById("manualChk").checked;
  const spec = document.getElementById("specChk").checked;

  let option = "";

  if(manual && spec){
    option = '("仕様書" OR "取扱説明書")';
  }else if(manual){
    option = '"取扱説明書"';
  }else if(spec){
    option = '"仕様書"';
  }

  const q = encodeURIComponent(`${keyword} ${option}`);

  location.href = `https://www.google.com/search?q=${q}`;
}


// 🔥戻り最適化
window.addEventListener("pageshow", ()=>{
  const input = document.getElementById("modelInput");
  if(!input) return;

  input.focus();

  const len = input.value.length;
  input.setSelectionRange(len, len);
});

</script>

</body>
</html>
