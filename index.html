<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- 最も基本的なViewport設定のみに絞り込みました -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番検索</title>
<style>
/* =========================
   ✅ 最小限のCSSによるレンダリング保証
========================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif; /* 最も普遍的なフォントに変更 */
  background: #f8f9fa;
  margin: 0;
}

.container {
  width: 95%;
  max-width: 420px;
  background: #fff;
  padding: 30px 20px; /* パディングを調整 */
  border-radius: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05); /* シャドウも控えめに */
  text-align: center;
  margin: 20px auto; /* 上下のマージンを調整 */
}

h2 {
  color: #333;
}

/* InputとButtonに最もシンプルなスタイルを適用します */
input[type="text"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ccc;
    border-radius: 8px; /* 角丸を少し控えめに */
    font-size: 16px;
}

button.btn {
  width: 100%;
  padding: 14px;
  margin: 6px 0;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

/* 色の定義を再設定 */
.lens { background: #4285f4; }
.search { background: #34a853; }

.option{
  margin: 10px 0;
}

/* チェックボックス部分（今回はシンプルに表示のみ）*/
.check-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}
</style>
</head>
<body>

<div class="container">
    <h2>型番検索システム</h2>

    <!-- 入力フィールド -->
    <input type="text" id="productNumberInput" placeholder="商品型番を入力してください (例: ABC-1234)">

    <!-- 検索ボタン -->
    <button class="btn lens" onclick="searchProduct()">Googleで検索</button>

    <!-- オプションの表示（今回は動作しないが、レイアウト維持のため残します） -->
    <div class="option">
        <div class="check-row">
            <label class="checkbox-label"><input type="checkbox" id="chk1" checked disabled> 必須オプション</label>
            <span>〇</span>
        </div>
        <div class="check-row">
            <label class="checkbox-label"><input type="checkbox" id="chk2" checked disabled> 追加保証サービス</label>
            <span>△</span>
        </div>
    </div>

    <!-- リンクボタン（深層リンクを回避した汎用的なURL） -->
    <button class="btn search" onclick="openLens()">製品情報ページへ移動</button>
    
</div>
