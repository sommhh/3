<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番爆速検索</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.container{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}
.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.lens{background:#000;}
.manual{background:#4285f4;}
.spec{background:#34a853;}
</style>
</head>

<body>

<div class="container">

<h2>📄 型番爆速検索</h2>

<button class="btn lens" onclick="openLens()">📷 Googleレンズ</button>

<input id="modelInput" placeholder="型番を入力 or ペースト">

<button class="btn manual" onclick="pasteAndSearch()">📋 貼り付け検索</button>
<button class="btn manual" onclick="searchNow('取扱説明書')">📖 取説</button>
<button class="btn spec" onclick="searchNow('仕様書')">📑 仕様書</button>

</div>

<script>

// ✅ Googleレンズ起動（安定版）
function openLens(){
  const ua = navigator.userAgent.toLowerCase();

  if(ua.includes("android")){
    // Android → アプリ起動
    location.href = "intent://lens.google.com/#Intent;scheme=https;package=com.google.ar.lens;end";
  }else{
    // iPhone → Web版レンズ（確実動作）
    location.href = "https://lens.google.com/";
  }
}


// ✅ クリップボード → 貼り付け＋検索（ユーザー操作必須）
async function pasteAndSearch(){
  try{
    if(!navigator.clipboard){
      alert("この端末はペーストAPI非対応です");
      return;
    }

    const text = await navigator.clipboard.readText();

    if(!text){
      alert("コピーされていません");
      return;
    }

    const clean = text.trim();

    document.getElementById("modelInput").value = clean;

    autoSearch(clean);

  }catch(e){
    // iPhoneの制限対策
    alert("長押ししてペーストしてください");
  }
}


// ✅ 自動検索（安全処理付き）
function autoSearch(keyword){
  if(!keyword) return;

  const clean = keyword.trim();

  if(clean.length < 2) return; // 誤爆防止

  const q = encodeURIComponent(
    `${clean} ("仕様書" OR "取扱説明書") filetype:pdf -amazon -楽天`
  );

  location.href = `https://www.google.com/search?q=${q}`;
}


// ✅ 手動検索
function searchNow(type){
  const input = document.getElementById("modelInput");
  const keyword = input.value.trim();

  if(!keyword){
    alert("型番を入力してください");
    input.focus();
    return;
  }

  const q = encodeURIComponent(
    `${keyword} "${type}" filetype:pdf -amazon -楽天`
  );

  location.href = `https://www.google.com/search?q=${q}`;
}

</script>

</body>
</html>
