<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📸 Lens連携型番認識システム</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    width: 95%;
    max-width: 650px;
    background: #fff;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    color: #1a73e8;
    margin-bottom: 30px;
}

/* 初期 */
#scanInitialArea {
    padding: 50px 20px;
    border: 3px dashed #ccc;
    border-radius: 16px;
}

#btnScan {
    background: linear-gradient(90deg, #34a853, #2d7c3e);
    color: white;
    padding: 18px 40px;
    font-size: 1.2em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#btnScan:hover {
    transform: scale(1.05);
}

/* スキャン中 */
#scanProcessingArea {
    display: none;
    padding: 30px;
    background: #e3f2fd;
    border-radius: 16px;
}

.viewfinder {
    width: 100%;
    max-width: 320px;
    height: 240px;
    background: #111;
    margin: 20px auto;
    position: relative;
}

.viewfinder::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 10%;
    width: 80%;
    height: 3px;
    background: #fff;
    box-shadow: 0 0 10px yellow;
}

/* 結果 */
#resultArea {
    display: none;
}

#ocrResultBox {
    background: #fffbe6;
    border: 2px solid #fbc02d;
    padding: 20px;
    border-radius: 12px;
}

#extractedText {
    font-family: monospace;
    font-size: 2em;
    font-weight: bold;
    margin-top: 15px;
    padding: 10px;
    border: 2px dashed #ccc;
    cursor: pointer;
}

/* ボタン */
.button-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 20px;
}

button.action {
    padding: 12px 18px;
    border: none;
    border-radius: 8px;
    background: #1a73e8;
    color: white;
    cursor: pointer;
}

button.action:hover {
    opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

<h2>📸 型番スキャン</h2>

<!-- 初期 -->
<div id="scanInitialArea">
    <button id="btnScan">📷 スキャン開始</button>
</div>

<!-- スキャン中 -->
<div id="scanProcessingArea">
    <div class="viewfinder"></div>
    <p id="scanStatus">読み取り中...</p>
</div>

<!-- 結果 -->
<div id="resultArea">
    <div id="ocrResultBox">
        <div>認識結果</div>
        <div id="extractedText">VVF2.0-3C</div>
    </div>

    <div class="button-group">
        <button class="action" onclick="copyText()">コピー</button>
        <button class="action" onclick="searchGoogle()">検索</button>
        <button class="action" onclick="reset()">やり直し</button>
    </div>
</div>

</div>

<script>
const btnScan = document.getElementById('btnScan');
const initial = document.getElementById('scanInitialArea');
const processing = document.getElementById('scanProcessingArea');
const result = document.getElementById('resultArea');
const text = document.getElementById('extractedText');

btnScan.onclick = () => {
    initial.style.display = "none";
    processing.style.display = "block";

    setTimeout(() => {
        processing.style.display = "none";
        result.style.display = "block";
    }, 2000);
};

function copyText(){
    navigator.clipboard.writeText(text.innerText);
    alert("コピーしました");
}

function searchGoogle(){
    const q = text.innerText;
    window.open("https://www.google.com/search?q=" + encodeURIComponent(q));
}

function reset(){
    result.style.display = "none";
    initial.style.display = "block";
}
</script>

</body>
</html>
