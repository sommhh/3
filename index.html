<head>

<!-- viewport-fit=cover を残すことで、モバイルでの表示崩れを防ぎます -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>型番検索</title>

/* CSSは機能的な変更はないため維持します */
*{box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  margin:0;
  -webkit-text-size-adjust:100%;
}
.container{
  width:90%;
  max-width:400px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  margin:40px auto;
}
h2{
  margin-top:0;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}
.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}
.btn:active{
  transform:scale(0.98);
}
.lens{background:#000;}
.search{background:#4285f4;}
.option{
  margin:10px 0;
}
