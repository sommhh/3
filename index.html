<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- viewport-fit=cover を残し、モバイルでの表示崩れを防ぎます -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>型番検索</title>
<style>
/* =========================
   ✅ CSS（見た目）の維持・改善
========================= */
* { box-sizing: border-box; }
body {
  font-family:-apple-system, BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif;
  background:#f8f9fa;
  margin:0;
  padding:0; /* paddingを加え、端の隙間をなくす */
}
.container {
  width:90%;
  max-width:420px; /* 少し幅を広げて視認性向上 */
  background:#fff;
  padding:30px 25px; /* パディング調整 */
  border-radius:18px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08); /* シャドウを少し柔らかく */
  text-align:center;
  margin:30px auto;
}
h2 {
  margin-top:0;
  color:#333;
}
input[type="text"] {
  width:100%;
  padding:14px; /* パディングを大きく */
  border-radius:12px;
  border:1px solid #ddd;
  margin:15px 0;
  font-size:18px;
}
button.btn {
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  transition: background-color 0.1s; /* ホバー時のアニメーション追加 */
}
button.btn:active {
  transform:scale(0.98);
}

/* 色の定義 */
.lens { background:#4285f4; } /* Googleの色に統一し、視認性向上 */
.search { background:#34a853; } /* 緑系で検索を強調 */

.option{
  margin:10px 0;
}
/* チェックボックス部分のレイアウト調整 */
.check-row {
  display:flex;
  align-items:center;
  justify-content:space-between;
  text-align:left;
  padding:8px 0;
  border-bottom:1px solid #eee;
}
.checkbox-label {
    font-size:16px;
    color:#333;
}

/* アラートメッセージのスタイル */
#messageArea {
    margin-top:20px;
    padding:10px;
    border-radius:8px;
    background-color: #fffbe6; /* 薄い黄色 */
    color: #7c6319; /* 茶色っぽいテキスト */
}

</style>
</head>
