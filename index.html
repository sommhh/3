<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>型番検索 Live</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f5f7;margin:0}
.wrap{width:92%;max-width:430px;background:#fff;margin:26px auto;padding:20px;border-radius:20px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
h2{margin:0 0 12px;text-align:center}
.btn{width:100%;padding:15px;margin:7px 0;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer}
.cam{background:#000}.paste{background:#5856d6}.lens{background:#4285f4}.search{background:#34a853}
.tip{font-size:13px;background:#f1f3f5;padding:12px;border-radius:10px;line-height:1.6;margin:10px 0}
input{width:100%;padding:13px;border:1px solid #ccc;border-radius:10px;font-size:17px;margin:8px 0}
.preview{width:100%;border-radius:12px;margin-top:10px;display:none}
.row{display:flex;gap:8px}
.row.btn{flex:1}
.checks{font-size:14px;margin:8px 0}
</style>
</head>
<body>
<div class="wrap">
<h2>型番検索</h2>

<div id="tip" class="tip"></div>

<button class="btn cam" onclick="takePhoto()">📷 カメラで撮影</button>
<input type="file" id="file" accept="image/*" capture="environment" style="display:none" onchange="preview(this)">

<img id="preview" class="preview">

<div class="row">
  <button class="btn paste" onclick="doPaste()">📋 貼り付け</button>
  <button class="btn lens" id="lensBtn" onclick="openLens()">🔍 レンズ</button>
</div>

<input id="model" placeholder="型番を貼り付け or 入力">

<div class="checks">
  <label><input type="checkbox" id="man"> 取扱説明書</label>
  <label style="margin-left:12px"><input type="checkbox" id="spec"> 仕様書</label>
</div>

<button class="btn search" onclick="search()">検索</button>
</div>

<script>
const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent)
const isAndroid = /Android/.test(navigator.userAgent)
const tip = document.getElementById('tip')
const lensBtn = document.getElementById('lensBtn')

if(isIOS){
  tip.innerHTML = '<b>iPhoneの手順</b><br>1. カメラで撮影<br>2. 写真を長押し →「テキストを認識」→ 型番をコピー<br>3. 「貼り付け」ボタンをタップ'
  lensBtn.style.display = 'none'
} else if(isAndroid){
  tip.innerHTML = '<b>Androidの手順</b><br>1. 「レンズ」ボタンでGoogleレンズ起動<br>2. 型番を読み取ってコピー<br>3. 自動で入力されます'
} else {
  tip.innerHTML = 'カメラで撮影後、コピーした型番を貼り付けてください'
}

function takePhoto(){
  document.getElementById('file').click()
}

function preview(input){
  if(input.files && input.files[0]){
    const img = document.getElementById('preview')
    img.src = URL.createObjectURL(input.files[0])
    img.style.display = 'block'
    if(isIOS){
      setTimeout(()=>alert('写真を保存しました。写真アプリで長押し→「テキストを認識」で型番をコピーしてください'),300)
    }
  }
}

async function doPaste(){
  try{
    const text = await navigator.clipboard.readText()
    if(text){
      document.getElementById('model').value = text.trim()
    } else {
      alert('クリップボードが空です')
    }
  }catch(e){
    alert('貼り付けを許可してください')
  }
}

function openLens(){
  // Androidはアプリ優先、なければWebへ
  if(isAndroid){
    window.location.href = 'intent://scan/#Intent;scheme=zxing;package=com.google.ar.lens;S.browser_fallback_url=https://lens.google.com;end'
  } else {
    window.open('https://lens.google.com','_blank')
  }
}

function search(){
  const v = document.getElementById('model').value.trim()
  if(!v) return alert('型番を入力してください')
  const man = document.getElementById('man').checked
  const spec = document.getElementById('spec').checked
  let opt = ''
  if(man && spec) opt = ' ("仕様書" OR "取扱説明書")'
  else if(man) opt = ' "取扱説明書"'
  else if(spec) opt = ' "仕様書"'
  location.href = 'https://www.google.com/search?q=' + encodeURIComponent(v + opt)
}

// Androidは自動貼り付け
if(isAndroid && navigator.clipboard){
  let last = ''
  setInterval(async()=>{
    try{
      const t = await navigator.clipboard.readText()
      if(t && t!== last && t.length>2){
        last = t
        document.getElementById('model').value = t.trim()
      }
    }catch(e){}
  },1500)
}
</script>
</body>
</html>
