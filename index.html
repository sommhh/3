<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>型番検索</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
*{box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#f8f9fa;
  margin:0;
}

.container{
  width:90%;
  max-width:420px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  text-align:center;
  margin:30px auto;
}

.btn{
  width:100%;
  padding:14px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  color:#fff;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

.btn:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.lens{background:#000;}
.ocr{background:#34a853;}
.search{background:#4285f4;}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  margin:10px 0;
  font-size:16px;
}

.check-row{
  display:flex;
  align-items:center;
  gap:10px;
  margin:6px 0;
}

.check-row input{
  width:18px;
  height:18px;
}

video{
  width:100%;
  border-radius:12px;
  margin-top:10px;
  display:none;
}
video.active{display:block;}

canvas{display:none;}

.status{
  font-size:14px;
  color:#666;
  margin:8px 0;
  min-height:20px;
}
</style>
</head>

<body>

<div class="container">

<h2>型番検索</h2>

<button class="btn lens" id="lensBtn" onclick="startCamera()">📷 レンズ</button>
<button class="btn ocr" id="ocrBtn" onclick="startCamera(true)">📸 OCRスキャン</button>

<div class="status" id="status"></div>

<input id="modelInput" placeholder="型番">

<div class="check-row">
  <input type="checkbox" id="manualChk">
  <label for="manualChk">取扱説明書</label>
</div>

<div class="check-row">
  <input type="checkbox" id="specChk">
  <label for="specChk">仕様書</label>
</div>

<button class="btn search" onclick="search()">検索</button>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

</div>

<script>
const ua = navigator.userAgent.toLowerCase();
const isAndroid = ua.includes("android");

let stream = null;
let running = false;
let worker = null;
let clipboardTimer = null;
let lastClipboard = "";
let useOCR = false;

/* カメラ起動：レンズもOCRもここに統一 */
async function startCamera(enableOCR = false){
  if(running){
    stopCamera();
    return;
  }

  useOCR = enableOCR;
  const video = document.getElementById("video");
  const lensBtn = document.getElementById("lensBtn");
  const ocrBtn = document.getElementById("ocrBtn");
  const status = document.getElementById("status");
  
  try{
    lensBtn.disabled = true;
    ocrBtn.disabled = true;
    status.textContent = "カメラ起動中...";
    
    stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode: "environment"}
    });
    video.srcObject = stream;
    video.classList.add("active");
    
    await video.play();
    
    running = true;
    lensBtn.textContent = "⏹️ カメラ停止";
    ocrBtn.textContent = "⏹️ カメラ停止";
    lensBtn.disabled = false;
    ocrBtn.disabled = false;
    
    if(useOCR){
      status.textContent = "OCR準備中...";
      worker = await Tesseract.createWorker("eng");
      status.textContent = "型番をスキャン中...";
      scanLoop();
    } else {
      status.textContent = "型番をカメラに映してください";
    }
    
  } catch(e){
    status.textContent = "カメラ起動失敗: " + e.message;
    lensBtn.textContent = "📷 レンズ";
    ocrBtn.textContent = "📸 OCRスキャン";
    lensBtn.disabled = false;
    ocrBtn.disabled = false;
    stopCamera();
  }
}

/* スキャンループ：OCR有効時のみ */
async function scanLoop(){
  if(!running || !worker || !useOCR) return;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  if(!video.videoWidth || !video.videoHeight){
    setTimeout(scanLoop, 500);
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  try{
    const { data } = await worker.recognize(canvas);
    const model = extractModel(data.text);

    if(model){
      document.getElementById("modelInput").value = model;
      document.getElementById("status").textContent = `検出: ${model}`;
      stopCamera();
      setTimeout(() => runSearch(model), 500);
      return;
    }
  } catch(e){
    console.error(e);
  }

  setTimeout(scanLoop, 1200);
}

/* 停止 */
function stopCamera(){
  running = false;
  
  if(stream){
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  
  if(worker){
    worker.terminate();
    worker = null;
  }
  
  const video = document.getElementById("video");
  video.classList.remove("active");
  video.srcObject = null;
  
  document.getElementById("lensBtn").textContent = "📷 レンズ";
  document.getElementById("ocrBtn").textContent = "📸 OCRスキャン";
  document.getElementById("lensBtn").disabled = false;
  document.getElementById("ocrBtn").disabled = false;
  document.getElementById("status").textContent = "";
  useOCR = false;
}

/* 型番抽出 */
function extractModel(text){
  const lines = text.split("\n");
  let best = ""; 
  let bestScore = 0;

  for(const l of lines){
    const t = l.trim().toUpperCase();
    if(t.length < 4) continue;

    if(/[A-Z0-9\-]/.test(t)){
      let score = 0;
      if(/[0-9]/.test(t)) score += 2;
      if(/[A-Z]/.test(t)) score += 2;
      if(/-/.test(t)) score += 3;
      if(t.length >= 6) score += 2;
      if(/^[A-Z0-9\-]+$/.test(t)) score += 3;

      if(score > bestScore){
        bestScore = score;
        best = t;
      }
    }
  }
  return bestScore >= 6 ? best : "";
}

/* 検索 */
function search(){
  const val = document.getElementById("modelInput").value.trim();
  if(!val) return alert("型番を入力してください");
  runSearch(val);
}

function runSearch(keyword){
  stopCamera();
  
  const manual = document.getElementById("manualChk").checked;
  const spec = document.getElementById("specChk").checked;

  let opt = "";
  if(manual && spec) opt = '("仕様書" OR "取扱説明書")';
  else if(manual) opt = '"取扱説明書"';
  else if(spec) opt = '"仕様書"';

  const clean = keyword.replace(/[^\w\-\.]/g, "");
  const query = clean + (opt ? " " + opt : "");
  
  location.href = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
}

/* Android自動貼り付け */
if(isAndroid && navigator.clipboard){
  clipboardTimer = setInterval(async () => {
    try{
      const t = await navigator.clipboard.readText();
      if(t && t.length > 3 && t !== lastClipboard){
        lastClipboard = t;
        document.getElementById("modelInput").value = t;
      }
    }catch(e){}
  }, 2000);
}

/* ページ離脱時にカメラ停止 */
window.addEventListener("beforeunload", stopCamera);
window.addEventListener("pagehide", stopCamera);
</script>

</body>
</html>
